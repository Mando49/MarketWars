name: market_wars
description: MarketWars – Fantasy stock trading competition app

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  cloud_firestore: ^6.1.2

  # State management
  provider: ^6.1.1

  # Networking
  http: ^1.1.0

  # UI
  flutter_animate: ^4.3.0
  fl_chart: ^1.1.1
  google_fonts: ^8.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png
  
